<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filtros Forza</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    header h1 {
      font-size: 1.05rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      color: #ddd;
      text-transform: uppercase;
    }

    /* ── Drop Zone ─────────────────────────────────────── */
    #dropzone {
      width: min(600px, 100vw - 32px);
      aspect-ratio: 1;
      border: 1.5px dashed #252525;
      border-radius: 16px;
      background: #111;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #dropzone:hover,
    #dropzone.drag-over { border-color: #404040; background: #141414; }
    #dropzone.has-image  { cursor: default; }

    #drop-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: #363636;
      pointer-events: none;
      user-select: none;
    }
    #drop-label svg { width: 50px; height: 50px; }
    #drop-label p   { font-size: 0.8rem; letter-spacing: 0.06em; }

    #preview-canvas {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      max-width: 100%; max-height: 100%;
      display: none;
    }

    #delete-btn {
      position: absolute;
      top: 12px; right: 12px;
      width: 34px; height: 34px;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,70,70,0.35);
      border-radius: 8px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      color: #ff4444;
      z-index: 10;
      transition: background 0.15s, border-color 0.15s;
      padding: 0;
    }
    #delete-btn:hover { background: rgba(180,20,20,0.80); border-color: rgba(255,80,80,0.7); }
    #delete-btn svg   { width: 15px; height: 15px; pointer-events: none; }

    /* ── Controls ──────────────────────────────────────── */
    #controls {
      width: min(600px, 100vw - 32px);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      min-height: 40px;
    }
    #view-all-btn {
      display: none;
      align-items: center;
      gap: 7px;
      background: transparent;
      color: #777;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s;
    }
    #view-all-btn:hover { border-color: #555; color: #ccc; }
    #view-all-btn svg   { width: 13px; height: 13px; }

    #download-btn {
      display: none;
      align-items: center;
      gap: 7px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 9px 20px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.15s, transform 0.1s;
    }
    #download-btn:hover  { opacity: 0.82; }
    #download-btn:active { transform: scale(0.96); }
    #download-btn svg    { width: 13px; height: 13px; }

    /* ── Filter Strip ──────────────────────────────────── */
    #strip-wrap {
      width: min(600px, 100vw - 32px);
      position: relative;
      margin-top: 22px;
    }
    #filter-strip {
      overflow-x: auto;
      padding: 4px 2px 10px;
      scrollbar-width: none;
    }
    #filter-strip::-webkit-scrollbar { display: none; }
    #filter-list { display: flex; gap: 10px; width: max-content; }

    .filter-item {
      flex: 0 0 82px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      user-select: none;
    }
    .thumb-wrap {
      width: 82px; height: 82px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.15s;
      background: #1a1a1a;
    }
    .filter-item:hover  .thumb-wrap { transform: scale(1.05); }
    .filter-item.active .thumb-wrap { border-color: #fff; transform: scale(1.05); }
    .filter-thumb { width: 100%; height: 100%; display: block; }
    .filter-name {
      font-size: 0.62rem;
      color: #4a4a4a;
      text-align: center;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.15s;
    }
    .filter-item.active .filter-name { color: #ccc; }

    #strip-wrap::before,
    #strip-wrap::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0; width: 20px;
      z-index: 1; pointer-events: none;
    }
    #strip-wrap::before { left: 0;  background: linear-gradient(to right, #0a0a0a, transparent); }
    #strip-wrap::after  { right: 0; background: linear-gradient(to left,  #0a0a0a, transparent); }

    /* ── All Filters Panel ─────────────────────────────── */
    #all-panel {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      backdrop-filter: blur(6px);
    }
    #all-panel.open { opacity: 1; pointer-events: auto; }

    #all-panel-inner {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 18px;
      width: min(560px, 94vw);
      max-height: 82vh;
      overflow-y: auto;
      padding: 22px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
    }
    #all-panel-inner::-webkit-scrollbar { width: 4px; }
    #all-panel-inner::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    #all-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    #all-panel-header span {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #777;
    }
    #all-panel-close {
      background: none; border: none;
      color: #555; font-size: 1.6rem; line-height: 1;
      cursor: pointer; padding: 0 4px;
      transition: color 0.15s;
    }
    #all-panel-close:hover { color: #fff; }

    #all-panel-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    @media (max-width: 420px) { #all-panel-grid { grid-template-columns: repeat(3, 1fr); } }

    .panel-item {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      user-select: none;
    }
    .panel-thumb-wrap {
      width: 100%; aspect-ratio: 1;
      border-radius: 10px; overflow: hidden;
      border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.12s;
      background: #1a1a1a;
    }
    .panel-item:hover  .panel-thumb-wrap { transform: scale(1.04); }
    .panel-item.active .panel-thumb-wrap { border-color: #fff; }
    .panel-thumb-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .panel-name {
      font-size: 0.6rem; color: #555;
      text-align: center; letter-spacing: 0.05em;
      text-transform: uppercase; transition: color 0.15s;
    }
    .panel-item.active .panel-name { color: #ccc; }

    #file-input { display: none; }
  </style>
</head>
<body>

<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#777"
       stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="2" width="20" height="20" rx="5"/>
    <circle cx="12" cy="12" r="4"/>
    <circle cx="17.5" cy="6.5" r="1" fill="#777" stroke="none"/>
  </svg>
  <h1>Forza Filters</h1>
</header>

<div id="dropzone">
  <div id="drop-label">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    <p>Drag an image or click to upload</p>
  </div>
  <canvas id="preview-canvas"></canvas>
  <button id="delete-btn" title="Delete photo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <path d="M10 11v6M14 11v6"/>
      <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
    </svg>
  </button>
</div>

<div id="controls">
  <button id="view-all-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    All filters
  </button>
  <button id="download-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3v13M5 15l7 7 7-7"/>
      <path d="M3 21h18" opacity="0.4"/>
    </svg>
    Download
  </button>
</div>

<div id="strip-wrap">
  <div id="filter-strip">
    <div id="filter-list"></div>
  </div>
</div>

<div id="all-panel">
  <div id="all-panel-inner">
    <div id="all-panel-header">
      <span>All filters</span>
      <button id="all-panel-close">×</button>
    </div>
    <div id="all-panel-grid"></div>
  </div>
</div>

<input type="file" id="file-input" accept="image/*">

<script>
'use strict';

// ── Config ─────────────────────────────────────────────────────────────────
const FILTERS = [
  { id: 'original', label: 'Original' },
  { id: '8k',       label: '8K'       },
  { id: 'antigua',  label: 'Antigua'  },
  { id: 'vivid',    label: 'Vivid'    },
  { id: 'japonesa', label: 'Japonesa' },
  { id: 'polaroid', label: 'Polaroid' },
  { id: 'noir',     label: 'Noir'     },
  { id: 'dreamy',   label: 'Dreamy'   },
  { id: 'y2k',      label: 'Y2K'      },
  { id: 'golden',   label: 'Golden'   },
  { id: 'film',     label: 'Film'     },
  { id: 'pacific',  label: 'Pacific'  },
  { id: 'moody',    label: 'Moody'    },
  { id: 'fade',     label: 'Fade'     },
  { id: 'bloom',    label: 'Bloom'    },
];
const THUMB = 82;

// ── State ──────────────────────────────────────────────────────────────────
let srcImage = null;
let activeId = 'original';

// ── DOM ────────────────────────────────────────────────────────────────────
const dropzone      = document.getElementById('dropzone');
const dropLabel     = document.getElementById('drop-label');
const previewCanvas = document.getElementById('preview-canvas');
const pCtx          = previewCanvas.getContext('2d', { willReadFrequently: true });
const fileInput     = document.getElementById('file-input');
const downloadBtn   = document.getElementById('download-btn');
const viewAllBtn    = document.getElementById('view-all-btn');
const deleteBtn     = document.getElementById('delete-btn');
const filterList    = document.getElementById('filter-list');
const allPanel      = document.getElementById('all-panel');
const allPanelGrid  = document.getElementById('all-panel-grid');
const allPanelClose = document.getElementById('all-panel-close');

// ── Build strip ────────────────────────────────────────────────────────────
for (const f of FILTERS) {
  const el = document.createElement('div');
  el.className = 'filter-item' + (f.id === 'original' ? ' active' : '');
  el.dataset.id = f.id;
  el.innerHTML = `
    <div class="thumb-wrap">
      <canvas class="filter-thumb" id="th-${f.id}" width="${THUMB}" height="${THUMB}"></canvas>
    </div>
    <span class="filter-name">${f.label}</span>`;
  el.addEventListener('click', () => selectFilter(f.id));
  filterList.appendChild(el);
}

// ── Upload ─────────────────────────────────────────────────────────────────
dropzone.addEventListener('click', () => { if (!srcImage) fileInput.click(); });
fileInput.addEventListener('change', e => loadFile(e.target.files[0]));
dropzone.addEventListener('dragover',  e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f?.type.startsWith('image/')) loadFile(f);
});

function loadFile(file) {
  if (!file) return;
  const url = URL.createObjectURL(file);
  const img  = new Image();
  img.onload = () => {
    srcImage = img;
    URL.revokeObjectURL(url);
    activeId = 'original';
    document.querySelectorAll('.filter-item').forEach(el =>
      el.classList.toggle('active', el.dataset.id === 'original')
    );
    renderThumbs();
    renderPreview(activeId);
    dropLabel.style.display     = 'none';
    previewCanvas.style.display = 'block';
    downloadBtn.style.display   = 'flex';
    viewAllBtn.style.display    = 'flex';
    deleteBtn.style.display     = 'flex';
    dropzone.classList.add('has-image');
  };
  img.src = url;
}

// ── Delete ─────────────────────────────────────────────────────────────────
deleteBtn.addEventListener('click', e => {
  e.stopPropagation();
  srcImage    = null;
  activeId    = 'original';
  previewCanvas.style.display = 'none';
  dropLabel.style.display     = '';
  downloadBtn.style.display   = 'none';
  viewAllBtn.style.display    = 'none';
  deleteBtn.style.display     = 'none';
  dropzone.classList.remove('has-image');
  document.querySelectorAll('.filter-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === 'original')
  );
  for (const f of FILTERS) {
    const c = document.getElementById(`th-${f.id}`);
    if (c) c.getContext('2d').clearRect(0, 0, THUMB, THUMB);
  }
  fileInput.value = '';
  closePanel();
});

// ── All Filters Panel ──────────────────────────────────────────────────────
viewAllBtn.addEventListener('click', () => { buildPanelGrid(); allPanel.classList.add('open'); });
allPanelClose.addEventListener('click', closePanel);
allPanel.addEventListener('click', e => { if (e.target === allPanel) closePanel(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

function closePanel() { allPanel.classList.remove('open'); }

function buildPanelGrid() {
  allPanelGrid.innerHTML = '';
  for (const f of FILTERS) {
    const canvas  = document.getElementById(`th-${f.id}`);
    const dataURL = canvas ? canvas.toDataURL() : '';
    const item    = document.createElement('div');
    item.className  = 'panel-item' + (f.id === activeId ? ' active' : '');
    item.dataset.id = f.id;
    item.innerHTML  = `
      <div class="panel-thumb-wrap">
        <img class="panel-thumb-img" src="${dataURL}" alt="${f.label}">
      </div>
      <span class="panel-name">${f.label}</span>`;
    item.addEventListener('click', () => { selectFilter(f.id); closePanel(); });
    allPanelGrid.appendChild(item);
  }
}

// ── Thumbnails ─────────────────────────────────────────────────────────────
function renderThumbs() {
  const s    = srcImage;
  const side = Math.min(s.width, s.height);
  const sx   = (s.width  - side) / 2;
  const sy   = (s.height - side) / 2;
  for (const f of FILTERS) {
    const canvas = document.getElementById(`th-${f.id}`);
    const ctx    = canvas.getContext('2d', { willReadFrequently: true });
    ctx.clearRect(0, 0, THUMB, THUMB);
    ctx.drawImage(s, sx, sy, side, side, 0, 0, THUMB, THUMB);
    const id = ctx.getImageData(0, 0, THUMB, THUMB);
    runFilter(id, f.id, THUMB, THUMB);
    ctx.putImageData(id, 0, 0);
    runOverlay(ctx, f.id, THUMB, THUMB);
  }
}

// ── Preview ────────────────────────────────────────────────────────────────
function renderPreview(filterId) {
  if (!srcImage) return;
  const rect  = dropzone.getBoundingClientRect();
  const scale = Math.min(rect.width / srcImage.width, rect.height / srcImage.height, 1);
  const w     = Math.max(1, Math.round(srcImage.width  * scale));
  const h     = Math.max(1, Math.round(srcImage.height * scale));
  previewCanvas.width  = w;
  previewCanvas.height = h;
  pCtx.drawImage(srcImage, 0, 0, w, h);
  const id = pCtx.getImageData(0, 0, w, h);
  runFilter(id, filterId, w, h);
  pCtx.putImageData(id, 0, 0);
  runOverlay(pCtx, filterId, w, h);
}

function selectFilter(id) {
  activeId = id;
  document.querySelectorAll('.filter-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === id)
  );
  renderPreview(id);
}

// ── Download ───────────────────────────────────────────────────────────────
downloadBtn.addEventListener('click', () => {
  if (!srcImage) return;
  const w   = srcImage.naturalWidth  || srcImage.width;
  const h   = srcImage.naturalHeight || srcImage.height;
  const ec  = document.createElement('canvas');
  ec.width  = w; ec.height = h;
  const ctx = ec.getContext('2d', { willReadFrequently: true });
  ctx.drawImage(srcImage, 0, 0, w, h);
  const id = ctx.getImageData(0, 0, w, h);
  runFilter(id, activeId, w, h);
  ctx.putImageData(id, 0, 0);
  runOverlay(ctx, activeId, w, h);
  const a    = document.createElement('a');
  a.download = `forza-${activeId}.png`;
  a.href     = ec.toDataURL('image/png');
  a.click();
});

window.addEventListener('resize', () => { if (srcImage) renderPreview(activeId); });

// ── Filter Router ──────────────────────────────────────────────────────────
function runFilter(imageData, id, w, h) {
  switch (id) {
    case '8k':       f8K(imageData, w, h);  break;
    case 'antigua':  fAntiqua(imageData);   break;
    case 'vivid':    fVivid(imageData);     break;
    case 'japonesa': fJaponesa(imageData);  break;
    case 'polaroid': fPolaroid(imageData);  break;
    case 'noir':     fNoir(imageData);      break;
    case 'dreamy':   fDreamy(imageData);    break;
    case 'y2k':      fY2K(imageData, w, h); break;
    case 'golden':   fGolden(imageData);    break;
    case 'film':     fFilm(imageData);      break;
    case 'pacific':  fPacific(imageData);   break;
    case 'moody':    fMoody(imageData);     break;
    case 'fade':     fFade(imageData);      break;
    case 'bloom':    fBloom(imageData);     break;
  }
}

function runOverlay(ctx, id, w, h) {
  switch (id) {
    case '8k':       vignette(ctx, w, h, 0.18, [0,  0,  0]); break;
    case 'antigua':  vignette(ctx, w, h, 0.82, [0,  0,  0]); break;
    case 'vivid':    vignette(ctx, w, h, 0.28, [0,  0,  0]); break;
    case 'japonesa': vignette(ctx, w, h, 0.32, [0,  0,  0]); break;
    case 'noir':     vignette(ctx, w, h, 0.68, [0,  0,  0]); break;
    case 'dreamy':   dreamyGlow(ctx, w, h);                   break;
    case 'y2k':      vignette(ctx, w, h, 0.20, [8, 18,  0]); break;
    case 'golden':   vignette(ctx, w, h, 0.30, [28,10,  0]); break;
    case 'film':     vignette(ctx, w, h, 0.14, [0,  0,  0]); break;
    case 'pacific':  vignette(ctx, w, h, 0.24, [0,  0,  0]); break;
    case 'moody':    vignette(ctx, w, h, 0.58, [0,  0,  0]); break;
    case 'bloom':    bloomGlow(ctx, w, h);                    break;
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────
const clamp = v => v < 0 ? 0 : v > 255 ? 255 : v;
const lut   = fn => {
  const t = new Uint8Array(256);
  for (let i = 0; i < 256; i++) t[i] = clamp(fn(i) | 0);
  return t;
};

function convolve(imageData, k, w, h) {
  const s = new Uint8ClampedArray(imageData.data);
  const d = imageData.data;
  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      let r = 0, g = 0, b = 0;
      for (let ky = -1; ky <= 1; ky++) {
        for (let kx = -1; kx <= 1; kx++) {
          const ki = (ky + 1) * 3 + (kx + 1);
          const pi = ((y + ky) * w + (x + kx)) * 4;
          r += s[pi]     * k[ki];
          g += s[pi + 1] * k[ki];
          b += s[pi + 2] * k[ki];
        }
      }
      const di  = (y * w + x) * 4;
      d[di]     = clamp(r);
      d[di + 1] = clamp(g);
      d[di + 2] = clamp(b);
    }
  }
}

function vignette(ctx, w, h, strength, [cr, cg, cb]) {
  const cx = w / 2, cy = h / 2;
  const r  = Math.sqrt(cx * cx + cy * cy);
  const g  = ctx.createRadialGradient(cx, cy, r * 0.35, cx, cy, r);
  g.addColorStop(0, `rgba(${cr},${cg},${cb},0)`);
  g.addColorStop(1, `rgba(${cr},${cg},${cb},${strength})`);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
}

function dreamyGlow(ctx, w, h) {
  const tmp = document.createElement('canvas');
  tmp.width = w; tmp.height = h;
  const tc = tmp.getContext('2d');
  tc.filter = 'blur(20px)';
  tc.drawImage(ctx.canvas, 0, 0, w, h);
  ctx.globalCompositeOperation = 'screen';
  ctx.globalAlpha = 0.28;
  ctx.drawImage(tmp, 0, 0);
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
  vignette(ctx, w, h, 0.38, [170, 140, 215]);
}

function bloomGlow(ctx, w, h) {
  const tmp = document.createElement('canvas');
  tmp.width = w; tmp.height = h;
  const tc = tmp.getContext('2d');
  tc.filter = 'blur(28px)';
  tc.drawImage(ctx.canvas, 0, 0, w, h);
  ctx.globalCompositeOperation = 'screen';
  ctx.globalAlpha = 0.14;
  ctx.drawImage(tmp, 0, 0);
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
}

// ══ FILTER IMPLEMENTATIONS ══════════════════════════════════════════════════

// ── 8K ─────────────────────────────────────────────────────────────────────
function f8K(imageData, w, h) {
  convolve(imageData, [
     0,   -0.6,  0,
    -0.6,  3.4, -0.6,
     0,   -0.6,  0
  ], w, h);
  const d  = imageData.data;
  const sc = lut(v => {
    const t = v / 255;
    return 255 * (t < 0.5 ? 2 * t * t : 1 - 2 * (1 - t) * (1 - t));
  });
  for (let i = 0; i < d.length; i += 4) {
    d[i]     = sc[clamp(d[i]     * 0.93 | 0)];
    d[i + 1] = sc[d[i + 1]];
    d[i + 2] = sc[clamp(d[i + 2] * 1.08 | 0)];
  }
}

// ── Antigua ────────────────────────────────────────────────────────────────
function fAntiqua(imageData) {
  const d  = imageData.data;
  const fl = lut(v => v * 0.85 + 24);
  for (let i = 0; i < d.length; i += 4) {
    const gray = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
    let r = clamp(gray * 1.14 + 32 | 0);
    let g = clamp(gray * 0.96 + 10 | 0);
    let b = clamp(gray * 0.72       | 0);
    r = fl[r]; g = fl[g]; b = fl[b];
    const noise = (Math.random() - 0.5) * 28;
    d[i]     = clamp(r + noise);
    d[i + 1] = clamp(g + noise);
    d[i + 2] = clamp(b + noise);
  }
}

// ── Vivid ── (original foto2000 values: warm + saturated + highlight crush)
function fVivid(imageData) {
  const d  = imageData.data;
  const hc = lut(v => v < 195 ? v : 195 + (v - 195) * 0.3);
  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i + 1], b = d[i + 2];
    r = clamp(r * 1.18 | 0);
    g = clamp(g * 1.04 | 0);
    b = clamp(b * 0.76 | 0);
    const gr = 0.299 * r + 0.587 * g + 0.114 * b;
    r = clamp(gr + (r - gr) * 1.45 | 0);
    g = clamp(gr + (g - gr) * 1.45 | 0);
    b = clamp(gr + (b - gr) * 1.45 | 0);
    d[i]     = hc[clamp(r)];
    d[i + 1] = hc[clamp(g)];
    d[i + 2] = hc[clamp(b)];
  }
}

// ── Japonesa ───────────────────────────────────────────────────────────────
function fJaponesa(imageData) {
  const d  = imageData.data;
  const cc = lut(v => {
    const t = v / 255;
    return 255 * (t < 0.5 ? 2 * t * t : 1 - 2 * (1 - t) * (1 - t));
  });
  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i + 1], b = d[i + 2];
    const gr = 0.299 * r + 0.587 * g + 0.114 * b;
    r = clamp(gr + (r - gr) * 0.32 | 0);
    g = clamp(gr + (g - gr) * 0.32 | 0);
    b = clamp(gr + (b - gr) * 0.32 | 0);
    r = clamp(r * 0.86 | 0);
    g = clamp(g * 1.02 | 0);
    b = clamp(b * 1.14 | 0);
    d[i]     = cc[clamp(r)];
    d[i + 1] = cc[clamp(g)];
    d[i + 2] = cc[clamp(b)];
  }
}

// ── Polaroid ───────────────────────────────────────────────────────────────
function fPolaroid(imageData) {
  const d  = imageData.data;
  const lc = lut(v => v * 0.75 + 34);
  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i + 1], b = d[i + 2];
    r = lc[r]; g = lc[g]; b = lc[b];
    const bright = (r + g + b) / (3 * 255);
    const dark   = 1 - bright;
    r = clamp(r + bright * 16 | 0);
    g = clamp(g + bright *  8 | 0);
    b = clamp(b - bright * 10 | 0);
    g = clamp(g + dark * 13   | 0);
    b = clamp(b - dark * 11   | 0);
    d[i]     = r;
    d[i + 1] = g;
    d[i + 2] = b;
  }
}

// ── Noir ────────────────────────────────────────────────────────────────────
function fNoir(imageData) {
  const d  = imageData.data;
  const nc = lut(v =>
    v < 52  ? v * 0.42 :
    v > 205 ? 205 + (v - 205) * 1.65 : v
  );
  for (let i = 0; i < d.length; i += 4) {
    const v      = nc[clamp(0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2] | 0)];
    d[i] = d[i + 1] = d[i + 2] = v;
  }
}

// ── Dreamy ──────────────────────────────────────────────────────────────────
function fDreamy(imageData) {
  const d  = imageData.data;
  const lc = lut(v => v * 0.80 + 38);
  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i + 1], b = d[i + 2];
    r = lc[r]; g = lc[g]; b = lc[b];
    const gr = 0.299 * r + 0.587 * g + 0.114 * b;
    r = clamp(gr + (r - gr) * 0.68 | 0);
    g = clamp(gr + (g - gr) * 0.68 | 0);
    b = clamp(gr + (b - gr) * 0.68 | 0);
    r = clamp(r + 12);
    b = clamp(b -  5);
    d[i]     = r;
    d[i + 1] = g;
    d[i + 2] = b;
  }
}

// ── Y2K Real ────────────────────────────────────────────────────────────────
function fY2K(imageData, w, h) {
  convolve(imageData, [
    0.05, 0.15, 0.05,
    0.15, 0.20, 0.15,
    0.05, 0.15, 0.05
  ], w, h);
  const d  = imageData.data;
  const hc = lut(v => v < 185 ? v : 185 + (v - 185) * 0.20);
  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i + 1], b = d[i + 2];
    const gr = 0.299 * r + 0.587 * g + 0.114 * b;
    r = clamp(gr + (r - gr) * 0.80 | 0);
    g = clamp(gr + (g - gr) * 0.80 | 0);
    b = clamp(gr + (b - gr) * 0.80 | 0);
    r = clamp(r * 1.05 | 0);
    g = clamp(g * 1.10 | 0);
    b = clamp(b * 0.78 | 0);
    if (r > g + 18 && r > b + 18) r = clamp(r * 1.20 | 0);
    d[i]     = hc[clamp(r)];
    d[i + 1] = hc[clamp(g)];
    d[i + 2] = hc[clamp(b)];
    d[i]     = clamp(d[i]     + (Math.random() - 0.5) * 26);
    d[i + 1] = clamp(d[i + 1] + (Math.random() - 0.5) * 20);
    d[i + 2] = clamp(d[i + 2] + (Math.random() - 0.5) * 30);
  }
}

// ── Golden ─── warm golden hour, rich skintones, sun-kissed ────────────────
function fGolden(imageData) {
  const d  = imageData.data;
  const sl = lut(v => v * 0.91 + 16);
  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i + 1], b = d[i + 2];
    r = sl[r]; g = sl[g]; b = sl[b];
    // Warm golden cast
    r = clamp(r * 1.12 + 10 | 0);
    g = clamp(g * 1.04 +  2 | 0);
    b = clamp(b * 0.82      | 0);
    // Boost warm saturation, pull back blue
    const gr = 0.299 * r + 0.587 * g + 0.114 * b;
    r = clamp(gr + (r - gr) * 1.20 | 0);
    g = clamp(gr + (g - gr) * 1.12 | 0);
    b = clamp(gr + (b - gr) * 0.88 | 0);
    d[i]     = clamp(r);
    d[i + 1] = clamp(g);
    d[i + 2] = clamp(b);
  }
}

// ── Film ─── Portra-inspired: natural, warm, analog soul ───────────────────
function fFilm(imageData) {
  const d  = imageData.data;
  const sl = lut(v => v * 0.91 + 15);
  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i + 1], b = d[i + 2];
    r = sl[r]; g = sl[g]; b = sl[b];
    // Warm analog cast
    r = clamp(r + 12 | 0);
    g = clamp(g +  4 | 0);
    b = clamp(b -  8 | 0);
    // Gentle desat — film has less saturation than digital
    const gr = 0.299 * r + 0.587 * g + 0.114 * b;
    r = clamp(gr + (r - gr) * 0.86 | 0);
    g = clamp(gr + (g - gr) * 0.86 | 0);
    b = clamp(gr + (b - gr) * 0.86 | 0);
    // Fine grain
    const noise = (Math.random() - 0.5) * 9;
    d[i]     = clamp(r + noise);
    d[i + 1] = clamp(g + noise);
    d[i + 2] = clamp(b + noise);
  }
}

// ── Pacific ─── cool teal, VSCO-inspired, travel/nature ────────────────────
function fPacific(imageData) {
  const d  = imageData.data;
  const sl = lut(v => v * 0.90 + 16);
  const cc = lut(v => {
    const t = v / 255;
    return 255 * (t < 0.5 ? 2 * t * t : 1 - 2 * (1 - t) * (1 - t));
  });
  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i + 1], b = d[i + 2];
    r = sl[r]; g = sl[g]; b = sl[b];
    // Cool teal cast
    r = clamp(r * 0.87 | 0);
    g = clamp(g * 1.03 | 0);
    b = clamp(b * 1.13 | 0);
    // Moderate saturation boost
    const gr = 0.299 * r + 0.587 * g + 0.114 * b;
    r = clamp(gr + (r - gr) * 1.12 | 0);
    g = clamp(gr + (g - gr) * 1.12 | 0);
    b = clamp(gr + (b - gr) * 1.12 | 0);
    d[i]     = cc[clamp(r)];
    d[i + 1] = cc[clamp(g)];
    d[i + 2] = cc[clamp(b)];
  }
}

// ── Moody ─── cinematic teal-orange grade, Hollywood split-tone ─────────────
function fMoody(imageData) {
  const d  = imageData.data;
  const cc = lut(v => {
    const t = v / 255;
    return 255 * (t < 0.5 ? 2 * t * t : 1 - 2 * (1 - t) * (1 - t));
  });
  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i + 1], b = d[i + 2];
    const lum    = 0.299 * r + 0.587 * g + 0.114 * b;
    const bright = lum / 255;
    const dark   = 1 - bright;
    // Orange-warm in highlights
    r = clamp(r + bright * 22 | 0);
    g = clamp(g + bright *  6 | 0);
    b = clamp(b - bright * 15 | 0);
    // Teal in shadows
    r = clamp(r - dark * 18   | 0);
    g = clamp(g + dark *  5   | 0);
    b = clamp(b + dark * 20   | 0);
    d[i]     = cc[clamp(r)];
    d[i + 1] = cc[clamp(g)];
    d[i + 2] = cc[clamp(b)];
  }
}

// ── Fade ─── VSCO A-series: faded, muted, editorial, lifestyle ─────────────
function fFade(imageData) {
  const d  = imageData.data;
  const fc = lut(v => v * 0.72 + 42);
  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i + 1], b = d[i + 2];
    r = fc[r]; g = fc[g]; b = fc[b];
    // Desaturate for muted editorial look
    const gr = 0.299 * r + 0.587 * g + 0.114 * b;
    r = clamp(gr + (r - gr) * 0.78 | 0);
    g = clamp(gr + (g - gr) * 0.78 | 0);
    b = clamp(gr + (b - gr) * 0.78 | 0);
    // Very subtle cool cast
    b = clamp(b + 5);
    d[i]     = r;
    d[i + 1] = g;
    d[i + 2] = b;
  }
}

// ── Bloom ─── bright, airy, rosy, lifestyle/flatlay ────────────────────────
function fBloom(imageData) {
  const d  = imageData.data;
  const al = lut(v => v * 0.88 + 26);
  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i + 1], b = d[i + 2];
    r = al[r]; g = al[g]; b = al[b];
    // Warm rosy tint
    r = clamp(r + 14 | 0);
    g = clamp(g +  5 | 0);
    b = clamp(b -  5 | 0);
    // Slight desat for clean airy feel
    const gr = 0.299 * r + 0.587 * g + 0.114 * b;
    r = clamp(gr + (r - gr) * 0.88 | 0);
    g = clamp(gr + (g - gr) * 0.88 | 0);
    b = clamp(gr + (b - gr) * 0.88 | 0);
    d[i]     = clamp(r);
    d[i + 1] = clamp(g);
    d[i + 2] = clamp(b);
  }
}
