<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filtros Forza</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header>
  <div class="hdr-brand">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666"
         stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="5"/>
      <circle cx="12" cy="12" r="4"/>
      <circle cx="17.5" cy="6.5" r="1" fill="#666" stroke="none"/>
    </svg>
    <h1>Forza Filters</h1>
  </div>
  <div id="tab-bar">
    <button class="tab-btn active" data-tab="filters">Filters</button>
    <button class="tab-btn"        data-tab="grid">Grid Split</button>
  </div>
  <div class="hdr-actions">
    <button id="download-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v13M5 15l7 7 7-7"/>
        <path d="M3 21h18" opacity="0.4"/>
      </svg>
      Download
    </button>
  </div>
</header>

<!-- ── Filters Tab ─────────────────────────────────────────────────────── -->
<div id="tab-filters">

  <!-- Sidebar -->
  <aside id="sidebar">

    <div class="sb-section">
      <span class="sb-label">Transform</span>
      <button id="crop-btn" class="tool-btn" title="Crop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2v14a2 2 0 0 0 2 2h14"/>
          <path d="M18 22V8a2 2 0 0 0-2-2H2"/>
        </svg>
        <span class="tool-label">Crop</span>
      </button>
      <button id="rot-l-btn" class="tool-btn" title="Rotate left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M2.5 2v6h6"/>
          <path d="M2.66 15.57a10 10 0 1 0 .57-8.38"/>
        </svg>
        <span class="tool-label">Rotate L</span>
      </button>
      <button id="rot-r-btn" class="tool-btn" title="Rotate right">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6"/>
          <path d="M21.34 15.57a10 10 0 1 1-.57-8.38"/>
        </svg>
        <span class="tool-label">Rotate R</span>
      </button>
      <button id="flip-h-btn" class="tool-btn" title="Flip horizontal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 3L4 7l4 4M16 3l4 4-4 4"/>
          <line x1="12" y1="2" x2="12" y2="22"/>
        </svg>
        <span class="tool-label">Flip H</span>
      </button>
      <button id="flip-v-btn" class="tool-btn" title="Flip vertical">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 8l-4-4-4 4M21 16l-4 4-4-4"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
        </svg>
        <span class="tool-label">Flip V</span>
      </button>
    </div>

    <div class="sb-divider"></div>

    <div class="sb-section">
      <span class="sb-label">View</span>
      <button id="compare-btn" class="tool-btn" title="Before / After">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="18" rx="2"/>
          <line x1="12" y1="3" x2="12" y2="21"/>
          <path d="M9 9l-2 3 2 3M15 9l2 3-2 3"/>
        </svg>
        <span class="tool-label">Compare</span>
      </button>
      <button id="adjust-btn" class="tool-btn" title="Custom filter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="6"  x2="20" y2="6"/>
          <line x1="4" y1="12" x2="20" y2="12"/>
          <line x1="4" y1="18" x2="20" y2="18"/>
          <circle cx="9"  cy="6"  r="2.5"/>
          <circle cx="15" cy="12" r="2.5"/>
          <circle cx="9"  cy="18" r="2.5"/>
        </svg>
        <span class="tool-label">Adjust</span>
      </button>
      <button id="view-all-btn" class="tool-btn" title="All filters">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="tool-label">All Filters</span>
      </button>
      <button id="wm-btn" class="tool-btn" title="Watermark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 7V4h16v3M9 20h6M12 4v16"/>
        </svg>
        <span class="tool-label">Watermark</span>
      </button>
    </div>

    <div class="sb-divider"></div>

    <!-- Intensity -->
    <div id="intensity-bar">
      <span class="int-label">Intensity</span>
      <div class="int-row">
        <input type="range" id="intensity-slider" min="0" max="100" value="100">
        <span id="intensity-val">100%</span>
      </div>
    </div>

    <!-- Crop controls (shown in crop mode) -->
    <div id="crop-bar">
      <span class="sb-label">Aspect Ratio</span>
      <div id="crop-aspect-btns">
        <button class="aspect-btn active" data-ratio="">Free</button>
        <button class="aspect-btn" data-ratio="1:1">1:1</button>
        <button class="aspect-btn" data-ratio="4:3">4:3</button>
        <button class="aspect-btn" data-ratio="3:4">3:4</button>
        <button class="aspect-btn" data-ratio="16:9">16:9</button>
        <button class="aspect-btn" data-ratio="9:16">9:16</button>
      </div>
      <div id="crop-actions">
        <button id="crop-cancel">Cancel</button>
        <button id="crop-apply">Apply Crop</button>
      </div>
    </div>

    <!-- Watermark controls -->
    <div id="watermark-bar">
      <span class="sb-label">Text</span>
      <input type="text" id="wm-text-input" placeholder="Your watermark…" maxlength="40">
      <span class="sb-label" style="padding-top:2px">Opacity</span>
      <div class="wm-row">
        <input type="range" id="wm-opacity-slider" min="10" max="100" value="80">
        <span id="wm-opacity-val">80%</span>
      </div>
      <span class="sb-label" style="padding-top:2px">Position</span>
      <div id="wm-pos-grid">
        <button class="wm-pos-btn" data-pos="tl">↖</button>
        <button class="wm-pos-btn" data-pos="tc">↑</button>
        <button class="wm-pos-btn" data-pos="tr">↗</button>
        <div></div>
        <button class="wm-pos-btn" data-pos="c">●</button>
        <div></div>
        <button class="wm-pos-btn" data-pos="bl">↙</button>
        <button class="wm-pos-btn" data-pos="bc">↓</button>
        <button class="wm-pos-btn active" data-pos="br">↘</button>
      </div>
      <span class="sb-label" style="padding-top:2px">Font</span>
      <div style="display:flex;gap:4px">
        <button id="wm-font-normal"  class="wm-pos-btn active" style="flex:1;font-size:0.68rem">Aa</button>
        <button id="wm-font-cursive" class="wm-pos-btn"        style="flex:1;font-style:italic;font-family:Georgia,serif;font-size:0.68rem">Aa</button>
      </div>
    </div>

  </aside>

  <!-- Preview Area -->
  <div id="preview-area">
    <div id="dropzone">
      <div id="drop-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p>Drag an image or click to upload</p>
      </div>
      <canvas id="preview-canvas"></canvas>
      <button id="delete-btn" title="Delete photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Filter Strip -->
  <div id="strip-wrap">
    <div id="filter-strip">
      <div id="filter-list"></div>
    </div>
  </div>

</div><!-- #tab-filters -->

<div id="tab-grid">

  <div id="grid-dropzone">
    <div id="grid-drop-label">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <line x1="8"  y1="5" x2="8"  y2="19"/>
        <line x1="16" y1="5" x2="16" y2="19"/>
      </svg>
      <p>Drop a wide image to split</p>
    </div>
    <canvas id="grid-overlay-canvas"></canvas>
    <button id="grid-delete-btn" title="Remove">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
    </button>
  </div>

  <!-- Controls + footer in one bar -->
  <div id="grid-controls">
    <div class="gctrl-group">
      <span class="gctrl-label">Tiles</span>
      <div class="gctrl-btns" id="grid-tile-btns">
        <button class="gctrl-btn active" data-n="3">3</button>
        <button class="gctrl-btn"        data-n="2">2</button>
        <button class="gctrl-btn"        data-n="4">4</button>
        <button class="gctrl-btn"        data-n="6">6</button>
      </div>
    </div>
    <div class="gctrl-group">
      <span class="gctrl-label">Ratio</span>
      <div class="gctrl-btns" id="grid-ratio-btns">
        <button class="gctrl-btn active" data-ratio="9:16">9:16</button>
        <button class="gctrl-btn"        data-ratio="1:1">1:1</button>
        <button class="gctrl-btn"        data-ratio="4:3">4:3</button>
      </div>
    </div>
    <div id="grid-footer">
      <span id="grid-info"></span>
      <button id="grid-dl-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v13M5 15l7 7 7-7"/>
          <path d="M3 21h18" opacity="0.4"/>
        </svg>
        Download ZIP
      </button>
    </div>
  </div>

  <!-- Tile preview strip -->
  <div id="grid-tile-strip">
    <div id="grid-tile-inner">
      <div id="grid-tile-list"></div>
    </div>
  </div>

</div><!-- #tab-grid -->

</div><!-- #app -->

<input type="file" id="grid-file-input" accept="image/*">

<div id="all-panel">
  <div id="all-panel-inner">
    <div id="all-panel-header">
      <span>All filters</span>
      <button id="all-panel-close">×</button>
    </div>
    <div id="all-panel-grid"></div>
  </div>
</div>

<div id="edit-panel">
  <div id="edit-panel-inner">
    <div id="edit-header">
      <span>Custom Filter</span>
      <button id="edit-close">×</button>
    </div>
    <div id="slider-grid"></div>
    <div id="edit-footer">
      <input type="text" id="preset-name-input" placeholder="Preset name…" maxlength="28">
      <button id="edit-reset">Reset</button>
      <button id="edit-save">Save</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept="image/*">

<script src="js/filters.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/editor.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="js/gridsplit.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
